<div class="min-h-screen bg-gradient-to-b from-slate-950 via-slate-900 to-slate-800 text-white transition-all">
  <div class="mx-auto flex min-h-screen flex-col transition-all"
       [class.w-[95%]]="!isFullscreen" [class.w-full]="isFullscreen"
       [class.px-4]="!isFullscreen" [class.py-8]="!isFullscreen"
       [class.p-2]="isFullscreen">
    
    <header class="text-center transition-opacity" [class.hidden]="isFullscreen" [class.opacity-30]="isDraggingItem">
      <h1 class="text-4xl font-extrabold tracking-tight">Factory Simulator</h1>
    </header>

    <section class="flex-1 transition-all" [class.mt-6]="!isFullscreen" #gridHost>
      <div class="factory-surface relative h-full backdrop-blur transition-all"
           [class.rounded-3xl]="!isFullscreen" [class.rounded-xl]="isFullscreen"
           [class.border]="!isFullscreen" [class.border-white/10]="!isFullscreen" 
           [class.bg-white/5]="!isFullscreen" [class.bg-black/20]="isFullscreen"
           [class.p-5]="!isFullscreen" [class.p-2]="isFullscreen" 
           [class.shadow-xl]="!isFullscreen">
        
        @if (isDraggingItem) {
          <div class="absolute inset-0 z-40 bg-black/50 pointer-events-none"
               [class.rounded-3xl]="!isFullscreen" [class.rounded-xl]="isFullscreen"></div>
        }

        <app-playground-grid
          [conveyorGrid]="conveyorGrid"
          [gridCellSizePx]="gridCellSizePx"
          [previewCells]="previewCells"
          [getConveyorSymbol]="getConveyorSymbol"
          [isFullscreen]="isFullscreen"
          (toggleFullscreen)="toggleFullscreen()"
          (cellMouseDown)="onCellMouseDown($event.event, $event.rowIndex, $event.colIndex)"
          (cellMouseEnter)="onCellMouseEnter($event.rowIndex, $event.colIndex)">
        </app-playground-grid>

        <div class="relative mt-4 rounded-2xl border border-white/10 bg-white/5 p-4" [class.hidden]="isFullscreen">
          <div class="mb-3 text-xs font-semibold tracking-wide text-white">Items</div>
          
          <app-items
            [items]="items"
            [activeDraggedItemId]="activeDraggedItemId"
            [isDraggingItem]="isDraggingItem"
            [getItemSizePx]="getItemSizePx"
            (itemMouseDown)="onItemMouseDown($event)">
          </app-items>
        </div>

      </div>
    </section>
  </div>
</div>
