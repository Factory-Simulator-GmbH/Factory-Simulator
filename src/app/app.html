<div class="min-h-screen bg-gradient-to-b from-slate-950 via-slate-900 to-slate-800 text-slate-100">
  <div class="mx-auto flex min-h-screen w-[95%] flex-col px-4 py-8">
    <header class="text-center">
      <h1 class="text-4xl font-extrabold tracking-tight">Factory Simulator</h1>
    </header>

    <section class="mt-6 flex-1">
      <div class="factory-container h-full rounded-3xl border border-white/10 bg-white/5 p-5 shadow-xl backdrop-blur">
        <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
          <div class="mb-3 text-xs font-semibold tracking-wide text-slate-300">Playground</div>
          <div class="h-[50vh] rounded-2xl border-2 border-black bg-white/5 p-2 overflow-hidden">
            <table
              #playArea
              id="play-area"
              class="h-full w-full table-fixed border-collapse"
            >
              @for (row of grid; let r = $index; track r) {
                <tr class="h-[50px]">
                  @for (isConv of row; let c = $index; track c) {
                    <td
                      class="h-[50px] w-[50px] border border-white/10"
                      [class.border-0]="isConv"
                      [style.background]="isConv ? 'url(assets/images/conveyor.jpg) center/cover no-repeat' : ''"
                      (mousedown)="toggleCell(r, c)"
                      (mouseenter)="toggleCellIfPainting(r, c)"
                    ></td>
                  }
                </tr>
              }
            </table>
          </div>
        </div>
        <div class="mt-4 rounded-2xl border border-white/10 bg-white/5 p-4">
          <div class="mb-3 text-xs font-semibold tracking-wide text-slate-300">Items</div>

          <div
            id="item-area"
            class="min-h-[15vh] rounded-2xl border-2 border-black bg-white/5 p-3 flex flex-wrap gap-3"
          >
            @for (item of items; track item.id) {
              <div
                class="draggable grid select-none place-items-center rounded-xl border border-white/20 bg-white/10 text-slate-100 shadow-sm backdrop-blur touch-none"
                [class.w-[150px]]="item.size === 'large'"
                [class.h-[150px]]="item.size === 'large'"
                [class.w-[50px]]="item.size === 'small'"
                [class.h-[50px]]="item.size === 'small'"
              >
                {{ item.label }}
              </div>
            }
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
