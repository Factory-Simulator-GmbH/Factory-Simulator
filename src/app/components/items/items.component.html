<div class="relative mt-4 rounded-2xl border border-white/10 bg-white/5 p-4">
  @if (isDraggingItem) {
    <div class="absolute inset-0 z-40 rounded-2xl bg-black/50 pointer-events-none"></div>
  }

  <div class="mb-3 text-xs font-semibold tracking-wide text-white">Items</div>

  <div
    id="item-palette"
    class="rounded-2xl border-2 border-black bg-white/5 p-3 flex flex-wrap gap-3"
  >
    @for (item of items; track item.id) {
      <div
        class="draggable-item grid select-none place-items-center rounded-xl border border-white/20 bg-white/10 text-white shadow-sm backdrop-blur touch-none"
        [attr.data-item-id]="item.id"
        [class.relative]="activeDraggedItemId === item.id"
        [class.z-50]="activeDraggedItemId === item.id"
        [style.width.px]="getItemSizePx(item.size)"
        [style.height.px]="getItemSizePx(item.size)"
        [id]="item.id"
        [appTooltip]="item.helpText"
        (mousedown)="onMouseDown(item.id)"
      >
        {{ item.label }}
      </div>
    }
  </div>
</div>
