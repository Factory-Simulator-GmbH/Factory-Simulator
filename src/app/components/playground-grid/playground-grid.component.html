<div class="transition-all relative"
     [class.rounded-2xl]="!isFullscreen" [class.border]="!isFullscreen" [class.border-white/10]="!isFullscreen" [class.bg-white/5]="!isFullscreen" [class.p-4]="!isFullscreen">
  
  <div class="mb-3 flex items-center justify-between text-xs font-semibold tracking-wide text-white" [class.px-2]="isFullscreen" [class.pt-2]="isFullscreen">
    <span>Playground</span>
    <button (click)="onToggleFullscreen()" class="relative z-50 flex items-center gap-2 rounded border border-white/20 bg-white/10 px-3 py-1.5 transition-colors hover:bg-white/20 active:bg-white/30 cursor-pointer">
      @if (isFullscreen) {
        <span>🗗 Exit Fullscreen</span>
      } @else {
        <span>🖵 Fullscreen</span>
      }
    </button>
  </div>

  <div class="overflow-hidden border-2 border-black bg-white/5 transition-all duration-300"
       [class.h-[50vh]]="!isFullscreen" [class.h-[88vh]]="isFullscreen"
       [class.rounded-2xl]="!isFullscreen" [class.rounded-xl]="isFullscreen"
       [class.p-2]="!isFullscreen">
    
    <table #gridTable class="h-full w-full table-fixed border-collapse">
      @for (row of conveyorGrid; let rowIndex = $index; track rowIndex) {
        <tr [style.height.px]="gridCellSizePx">

          @for (cell of row; let colIndex = $index; track colIndex) {
            <td
              [style.height.px]="gridCellSizePx"
              [style.width.px]="gridCellSizePx"
              class="cursor-crosshair border border-white/10 transition-colors text-center align-middle text-xl font-bold text-black"
              [class.border-0]="conveyorGrid[rowIndex][colIndex].active && !isPaintPreview(rowIndex, colIndex)"
              [class.bg-slate-300]="conveyorGrid[rowIndex][colIndex].active && !isPaintPreview(rowIndex, colIndex)"
              [class.border-2]="isPaintPreview(rowIndex, colIndex)"
              [class.border-slate-300]="isPaintPreview(rowIndex, colIndex)"
              [class.bg-slate-400]="isPaintPreview(rowIndex, colIndex)"
              (mousedown)="onMouseDown($event, rowIndex, colIndex)"
              (mouseenter)="onMouseEnter(rowIndex, colIndex)"
            >
              @if (conveyorGrid[rowIndex][colIndex].active) {
                <span class="inline-flex items-center justify-center leading-none">
                  {{ getConveyorSymbol(conveyorGrid[rowIndex][colIndex]) }}
                </span>
              }
            </td>
          }

        </tr>
      }
    </table>
  </div>
</div>
