<div class="rounded-2xl border border-white/10 bg-white/5 p-4">
  <div class="mb-3 text-xs font-semibold tracking-wide text-white">Playground</div>

  <div class="h-[50vh] overflow-hidden rounded-2xl border-2 border-black bg-white/5 p-2">
    <table #gridTable class="h-full w-full table-fixed border-collapse">
      <!-- Loop over rows of the conveyor belt grid -->
      @for (row of conveyorGrid; let rowIndex = $index; track rowIndex) {
        <tr>

          <!-- Loop over cells in a row -->
          @for (cell of row; let colIndex = $index; track colIndex) {
            <td
              [style.height.px]="gridCellSizePx"
              [style.width.px]="gridCellSizePx"
              class="relative cursor-crosshair border border-white/10 p-0 transition-colors text-black"
              [class.border-0]="conveyorGrid[rowIndex][colIndex].active && !isPaintPreview(rowIndex, colIndex)"
              [class.bg-slate-300]="conveyorGrid[rowIndex][colIndex].active && !isPaintPreview(rowIndex, colIndex)"
              [class.border-2]="isPaintPreview(rowIndex, colIndex)"
              [class.border-slate-300]="isPaintPreview(rowIndex, colIndex)"
              [class.bg-slate-400]="isPaintPreview(rowIndex, colIndex)"
              (mousedown)="onMouseDown($event, rowIndex, colIndex)"
              (mouseenter)="onMouseEnter(rowIndex, colIndex)"
            >
              @if (conveyorGrid[rowIndex][colIndex].active) {
                <span class="pointer-events-none absolute inset-0 inline-flex items-center justify-center text-sm leading-none font-bold">
                  {{ getConveyorSymbol(conveyorGrid[rowIndex][colIndex]) }}
                </span>
              }
            </td>
          }

        </tr>
      }
    </table>
  </div>
</div>
