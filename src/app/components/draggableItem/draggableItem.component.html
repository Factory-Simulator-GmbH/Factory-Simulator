<div
  [appTooltip]="item.helpText || ''"
  class="grid draggable-item select-none place-items-center rounded-xl border border-white/20 bg-white/10 text-white shadow-sm backdrop-blur touch-none"
  [attr.data-item-id]="item.id"
  [attr.id]="itemId"
  [style.width.px]="sizePx"
  [style.height.px]="sizePx"
  [style.font-size]="'clamp(14px, ' + sizePx * 0.12 + 'px, 9999px)'"
>
  @if (sizePx >= 35) {
    <span class="line-clamp-2 text-center break-words w-full leading-tight" style="hyphens: auto;">
      {{ item.label }}
    </span>
  } @else {
    <span class="text-center truncate w-full px-1">
      {{ item.label.charAt(0).toUpperCase() }}
    </span>
  }
</div>
